<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Contratos SMS Sobral</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
}
/* Painel esquerdo — foto */
.painel-foto {
  flex: 1;
  background: url('/static/capa_login.jpg') center center / cover no-repeat;
  position: relative;
}
.painel-foto::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(10,30,55,0.38) 0%, rgba(10,30,55,0.10) 100%);
}
/* Painel direito — login */
.painel-login {
  width: 420px;
  min-height: 100vh;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 44px;
  box-shadow: -6px 0 28px rgba(0,0,0,.13);
}
.card { width: 100%; }
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo .icone {
  width: 60px; height: 60px;
  background: #1a4a6b;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 14px;
}
.logo h1 { font-size: 18px; font-weight: 700; color: #1e293b; line-height: 1.3; }
.logo p { font-size: 12px; color: #64748b; margin-top: 4px; }
.campo { margin-bottom: 16px; }
.campo label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
.campo input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  color: #1e293b;
  background: #f8fafc;
  transition: border-color .15s, background .15s;
}
.campo input:focus {
  outline: none;
  border-color: #2563a8;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(37,99,168,.12);
}
.btn {
  width: 100%;
  padding: 12px;
  background: #1a4a6b;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
  margin-top: 6px;
  letter-spacing: .3px;
}
.btn:hover { background: #2563a8; }
.flash {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  background: #fee2e2;
  color: #991b1b;
  border: 1px solid #fca5a5;
}
.rodape { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 28px; }
/* Mobile: empilha */
@media (max-width: 680px) {
  .painel-foto { display: none; }
  .painel-login { width: 100%; padding: 40px 28px; }
}
</style>
</head>
<body>
<div class="painel-foto"></div>
<div class="painel-login">
  <div class="card">
    <div class="logo">
      <img src="/static/logo.png" alt="Logo Clínica" style="width:120px; height:auto; margin-bottom:14px; display:block; margin-left:auto; margin-right:auto;">
      <h1>Monitoramento de Contratos</h1>
      <p>CODR</p>
      <p style="font-size:11px; color:#b0bac7; margin-top:4px;">© Clínica de Olhos Dr. Rezende</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=True) %}
      {% for cat, msg in msgs %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autofocus placeholder="seu@email.com">
      </div>
      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="••••••••">
      </div>
      <button class="btn" type="submit">Entrar</button>
    </form>

    <div class="rodape">Clínica de Olhos Dr. Rezende · Sobral-CE</div>
  </div>
</div>
</body>
</html>
