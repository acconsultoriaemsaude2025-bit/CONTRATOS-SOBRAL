<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Contratos SMS Sobral</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: url('/static/capa_login.jpg') center top / cover no-repeat fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(15, 40, 70, 0.55);
  z-index: 0;
}
.card { position: relative; z-index: 1; }
.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 24px 48px rgba(0,0,0,.25);
}
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo .icone {
  width: 56px; height: 56px;
  background: #1a4a6b;
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 12px;
}
.logo h1 { font-size: 18px; font-weight: 700; color: #1e293b; }
.logo p { font-size: 12px; color: #64748b; margin-top: 2px; }
.campo { margin-bottom: 16px; }
.campo label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
.campo input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  color: #1e293b;
  transition: border-color .15s;
}
.campo input:focus {
  outline: none;
  border-color: #2563a8;
  box-shadow: 0 0 0 3px rgba(37,99,168,.12);
}
.btn {
  width: 100%;
  padding: 11px;
  background: #1a4a6b;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
  margin-top: 4px;
}
.btn:hover { background: #2563a8; }
.flash {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  background: #fee2e2;
  color: #991b1b;
  border: 1px solid #fca5a5;
}
.rodape { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 24px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icone">📋</div>
    <h1>Monitoramento de Contratos</h1>
    <p>Secretaria Municipal da Saúde — Sobral</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=True) %}
    {% for cat, msg in msgs %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required autofocus placeholder="seu@email.com">
    </div>
    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" required placeholder="••••••••">
    </div>
    <button class="btn" type="submit">Entrar</button>
  </form>

  <div class="rodape">Portal da Transparência de Sobral-CE</div>
</div>
</body>
</html>
